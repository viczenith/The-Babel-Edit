<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>New Order Notification</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body style="font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; line-height: 1.6; color: #374151; margin: 0; padding: 0; background-color: #f3e8e7;">
    <div style="max-width: 600px; margin: 0 auto; padding: 40px 16px;">
        <div style="background: #ffffff; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.06); overflow: hidden;">
            <!-- Header -->
            <div style="border-top: 4px solid #ef4444; padding: 28px 32px; text-align: center;">
                <p style="color: #7f1d1d; font-size: 11px; letter-spacing: 3px; text-transform: uppercase; margin: 0 0 8px;">New Order Received</p>
                <h1 style="color: #0f172a; font-size: 22px; font-weight: 600; margin: 0; letter-spacing: -0.025em; font-family: 'Playfair Display', Georgia, serif;">The Babel Edit</h1>
                <div style="width: 40px; height: 2px; background: #ef4444; margin: 14px auto 0;"></div>
            </div>

            <div style="padding: 32px;">
                <!-- Order Quick Info -->
                <div style="background: #fef7f7; border: 1px solid #f1eded; border-radius: 8px; padding: 20px; margin: 0 0 24px;">
                    <table width="100%" cellpadding="0" cellspacing="0" border="0">
                        <tr>
                            <td style="padding: 4px 0;">
                                <span style="font-size: 12px; color: #64748b; text-transform: uppercase; letter-spacing: 1px;">Order</span><br>
                                <span style="font-size: 16px; color: #0f172a; font-weight: 600;">{{orderNumber}}</span>
                            </td>
                            <td style="padding: 4px 0; text-align: right;">
                                <span style="font-size: 12px; color: #64748b; text-transform: uppercase; letter-spacing: 1px;">Total</span><br>
                                <span style="font-size: 16px; color: #0f172a; font-weight: 700;">{{total}}</span>
                            </td>
                        </tr>
                        <tr>
                            <td colspan="2" style="padding: 12px 0 0; border-top: 1px solid #e8d9d9; margin-top: 12px;">
                                <span style="font-size: 12px; color: #64748b; text-transform: uppercase; letter-spacing: 1px;">Customer</span><br>
                                <span style="font-size: 14px; color: #0f172a;">{{customerName}}</span>
                                <span style="font-size: 13px; color: #64748b;"> · {{customerEmail}}</span>
                            </td>
                        </tr>
                    </table>
                </div>

                <!-- Items Table -->
                <p style="font-size: 11px; letter-spacing: 3px; text-transform: uppercase; color: #7f1d1d; margin: 0 0 12px; font-weight: 600;">Order Items</p>
                <table width="100%" cellpadding="0" cellspacing="0" border="0">
                    <thead>
                        <tr>
                            <th style="padding: 10px 0; border-bottom: 2px solid #0f172a; text-align: left; font-size: 11px; text-transform: uppercase; letter-spacing: 1px; color: #64748b; font-weight: 600;">SKU</th>
                            <th style="padding: 10px 0; border-bottom: 2px solid #0f172a; text-align: left; font-size: 11px; text-transform: uppercase; letter-spacing: 1px; color: #64748b; font-weight: 600;">Item</th>
                            <th style="padding: 10px 0; border-bottom: 2px solid #0f172a; text-align: center; font-size: 11px; text-transform: uppercase; letter-spacing: 1px; color: #64748b; font-weight: 600;">Qty</th>
                            <th style="padding: 10px 0; border-bottom: 2px solid #0f172a; text-align: right; font-size: 11px; text-transform: uppercase; letter-spacing: 1px; color: #64748b; font-weight: 600;">Price</th>
                        </tr>
                    </thead>
                    <tbody>
                        {{orderItems}}
                    </tbody>
                </table>

                <!-- Shipping Address -->
                <p style="font-size: 11px; letter-spacing: 3px; text-transform: uppercase; color: #7f1d1d; margin: 28px 0 12px; font-weight: 600;">Shipping Address</p>
                <div style="background: #fef7f7; border-left: 3px solid #ef4444; border-radius: 0 8px 8px 0; padding: 14px 20px; margin: 0 0 24px;">
                    <p style="font-size: 14px; color: #374151; margin: 0; line-height: 1.6;">{{shippingAddress}}</p>
                </div>

                <!-- CTA -->
                <div style="text-align: center; margin: 28px 0 0;">
                    <a href="{{adminOrderUrl}}" style="display: inline-block; padding: 14px 40px; background-color: #ef4444; color: #ffffff; text-decoration: none; font-size: 13px; letter-spacing: 1px; text-transform: uppercase; font-weight: 600; border-radius: 9999px;">View in Admin Panel</a>
                </div>
            </div>

            <!-- Footer -->
            <div style="border-top: 1px solid #e8d9d9; padding: 20px 32px; text-align: center;">
                <p style="color: #64748b; font-size: 11px; margin: 0;">This is an internal notification — The Babel Edit Admin</p>
            </div>
        </div>
    </div>
</body>
</html>
