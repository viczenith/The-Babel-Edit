<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>New Order Notification</title>
</head>
<body style="font-family: 'Helvetica Neue', Arial, sans-serif; line-height: 1.6; color: #1a1a1a; margin: 0; padding: 0; background-color: #f5f0eb;">
    <div style="max-width: 600px; margin: 0 auto; padding: 40px 16px;">
        <div style="background: #ffffff; border-radius: 2px; box-shadow: 0 2px 12px rgba(0,0,0,0.08); overflow: hidden;">
            <!-- Header -->
            <div style="background: #1a1a1a; padding: 32px; text-align: center;">
                <p style="color: #c9a96e; font-size: 11px; letter-spacing: 4px; text-transform: uppercase; margin: 0 0 8px;">New Order Received</p>
                <h1 style="color: #ffffff; font-size: 24px; font-weight: 400; margin: 0; letter-spacing: 2px; font-family: 'Georgia', serif;">THE BABEL EDIT</h1>
                <div style="width: 40px; height: 1px; background: #c9a96e; margin: 16px auto 0;"></div>
            </div>

            <div style="padding: 32px;">
                <!-- Order Quick Info -->
                <div style="background: #fdfbf7; border: 1px solid #e8e0d4; padding: 20px; margin: 0 0 24px;">
                    <table width="100%" cellpadding="0" cellspacing="0" border="0">
                        <tr>
                            <td style="padding: 4px 0;">
                                <span style="font-size: 12px; color: #999; text-transform: uppercase; letter-spacing: 1px;">Order</span><br>
                                <span style="font-size: 16px; color: #1a1a1a; font-weight: 600;">{{orderNumber}}</span>
                            </td>
                            <td style="padding: 4px 0; text-align: right;">
                                <span style="font-size: 12px; color: #999; text-transform: uppercase; letter-spacing: 1px;">Total</span><br>
                                <span style="font-size: 16px; color: #1a1a1a; font-weight: 700;">{{total}}</span>
                            </td>
                        </tr>
                        <tr>
                            <td colspan="2" style="padding: 12px 0 0; border-top: 1px solid #e8e0d4; margin-top: 12px;">
                                <span style="font-size: 12px; color: #999; text-transform: uppercase; letter-spacing: 1px;">Customer</span><br>
                                <span style="font-size: 14px; color: #1a1a1a;">{{customerName}}</span>
                                <span style="font-size: 13px; color: #888;"> · {{customerEmail}}</span>
                            </td>
                        </tr>
                    </table>
                </div>

                <!-- Items Table -->
                <p style="font-size: 11px; letter-spacing: 3px; text-transform: uppercase; color: #999; margin: 0 0 12px;">Order Items</p>
                <table width="100%" cellpadding="0" cellspacing="0" border="0">
                    <thead>
                        <tr>
                            <th style="padding: 10px 0; border-bottom: 2px solid #1a1a1a; text-align: left; font-size: 11px; text-transform: uppercase; letter-spacing: 1px; color: #999; font-weight: 600;">SKU</th>
                            <th style="padding: 10px 0; border-bottom: 2px solid #1a1a1a; text-align: left; font-size: 11px; text-transform: uppercase; letter-spacing: 1px; color: #999; font-weight: 600;">Item</th>
                            <th style="padding: 10px 0; border-bottom: 2px solid #1a1a1a; text-align: center; font-size: 11px; text-transform: uppercase; letter-spacing: 1px; color: #999; font-weight: 600;">Qty</th>
                            <th style="padding: 10px 0; border-bottom: 2px solid #1a1a1a; text-align: right; font-size: 11px; text-transform: uppercase; letter-spacing: 1px; color: #999; font-weight: 600;">Price</th>
                        </tr>
                    </thead>
                    <tbody>
                        {{orderItems}}
                    </tbody>
                </table>

                <!-- Shipping Address -->
                <p style="font-size: 11px; letter-spacing: 3px; text-transform: uppercase; color: #999; margin: 28px 0 12px;">Shipping Address</p>
                <div style="background: #fdfbf7; border-left: 3px solid #c9a96e; padding: 14px 20px; margin: 0 0 24px;">
                    <p style="font-size: 14px; color: #555; margin: 0; line-height: 1.6;">{{shippingAddress}}</p>
                </div>

                <!-- CTA -->
                <div style="text-align: center; margin: 28px 0 0;">
                    <a href="{{adminOrderUrl}}" style="display: inline-block; padding: 14px 40px; background-color: #1a1a1a; color: #ffffff; text-decoration: none; font-size: 13px; letter-spacing: 2px; text-transform: uppercase; font-weight: 600;">View in Admin Panel</a>
                </div>
            </div>

            <!-- Footer -->
            <div style="background: #f5f0eb; padding: 20px 32px; text-align: center; border-top: 1px solid #e8e0d4;">
                <p style="color: #999; font-size: 11px; margin: 0;">This is an internal notification — The Babel Edit Admin</p>
            </div>
        </div>
    </div>
</body>
</html>
